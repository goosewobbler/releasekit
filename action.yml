name: ReleaseKit – Automated Versioning & Release
description: Run ReleaseKit in preview or release mode
author: goosewobbler

branding:
  icon: package
  color: green

inputs:
  mode:
    description: Action mode (release, preview, or gate)
    required: false
    default: preview
  config:
    description: Path to releasekit config file
    required: false
  project-dir:
    description: Project directory to run in
    required: false
    default: .
  dry-run:
    description: Dry-run mode
    required: false
    default: "false"
  json:
    description: Enable JSON output (release mode)
    required: false
    default: "false"
  verbose:
    description: Enable verbose logging
    required: false
    default: "false"
  quiet:
    description: Suppress non-error output
    required: false
    default: "false"
  skip-checkout:
    description: "Skip repository checkout (assume repo is already checked out). WARNING: Ensure repository has full git history (fetch-depth: 0) for proper version-bumping logic. Shallow clones may cause incorrect version bumps or silent failures."
    required: false
    default: "false"

  bump:
    description: Force bump type (patch|minor|major|prerelease)
    required: false
  prerelease:
    description: Create prerelease version (optional identifier)
    required: false
  stable:
    description: Graduate prerelease packages to stable without bumping
    required: false
    default: "false"
  sync:
    description: Use synchronized versioning
    required: false
    default: "false"
  target:
    description: Target packages (comma-separated)
    required: false
  scope:
    description: Scope name to resolve to target packages from ci.scopeLabels config
    required: false
  branch:
    description: Override git branch used for push
    required: false
  node-version:
    description: Node.js version
    required: false
    default: "20"
  npm-auth:
    description: NPM auth method (auto|oidc|token)
    required: false
    default: auto
  npm-token:
    description: NPM token for publishing (or use NPM_TOKEN input)
    required: false
  skip-notes:
    description: Skip changelog generation
    required: false
    default: "false"
  skip-publish:
    description: Skip registry publishing and git operations
    required: false
    default: "false"
  skip-git:
    description: Skip git commit/tag/push
    required: false
    default: "false"
  skip-github-release:
    description: Skip GitHub release creation
    required: false
    default: "false"
  skip-verification:
    description: Skip post-publish verification
    required: false
    default: "false"
  ssh-key:
    description: SSH deploy key for git push (enables SSH checkout when not dry-run)
    required: false

  pr:
    description: Pull request number (preview mode)
    required: false
  repo:
    description: Repository in owner/repo format (preview mode)
    required: false
  preview-prerelease:
    description: Force prerelease preview (optional identifier)
    required: false
  preview-stable:
    description: Force stable preview
    required: false
    default: "false"
  preview-dry-run:
    description: Print preview markdown without posting
    required: false
    default: "false"
  preview-target:
    description: Target packages in preview mode (comma-separated)
    required: false
  summary:
    description: Write GITHUB_STEP_SUMMARY markdown
    required: false
    default: "true"

outputs:
  success:
    description: Whether action completed successfully
    value: ${{ steps.run.outputs.success }}
  mode:
    description: Executed mode
    value: ${{ steps.run.outputs.mode }}
  should-release:
    description: Whether a release should proceed (gate mode)
    value: ${{ steps.run.outputs.should-release }}
  bump:
    description: Resolved bump type (gate mode)
    value: ${{ steps.run.outputs.bump }}
  gate-scope:
    description: Resolved scope name (gate mode)
    value: ${{ steps.run.outputs.gate-scope }}
  gate-target:
    description: Resolved target packages (gate mode)
    value: ${{ steps.run.outputs.gate-target }}
  gate-stable:
    description: Whether the release should be a stable graduation (gate mode, release:stable label)
    value: ${{ steps.run.outputs.gate-stable }}
  has-changes:
    description: "Whether a release has changes (release mode, requires json: true)"
    value: ${{ steps.run.outputs.has-changes }}
  version-output:
    description: Version output JSON (release mode)
    value: ${{ steps.run.outputs.version-output }}
  tags:
    description: Comma-separated tags (release mode)
    value: ${{ steps.run.outputs.tags }}
  release-output:
    description: Full release output JSON (release mode)
    value: ${{ steps.run.outputs.release-output }}
  preview-markdown:
    description: Preview markdown (preview mode with dry-run)
    value: ${{ steps.run.outputs.preview-markdown }}
  preview-posted:
    description: Whether preview was posted (preview mode, non-dry-run)
    value: ${{ steps.run.outputs.preview-posted }}

runs:
  using: composite
  steps:
    - name: Checkout (SSH)
      if: ${{ inputs.skip-checkout != 'true' && inputs.ssh-key != '' && inputs.dry-run != 'true' && inputs.mode != 'gate' }}
      uses: actions/checkout@v6
      with:
        ssh-key: ${{ inputs.ssh-key }}
        fetch-depth: 0

    - name: Checkout (read-only)
      if: ${{ inputs.skip-checkout != 'true' && (inputs.ssh-key == '' || inputs.dry-run == 'true' || inputs.mode == 'gate') }}
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install action runtime deps
      run: pnpm install --frozen-lockfile
      working-directory: ${{ github.action_path }}
      shell: bash

    - name: Fetch and sync remote (skip-checkout)
      if: ${{ inputs.skip-checkout == 'true' }}
      run: |
        CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
        if [ "$CURRENT_BRANCH" = "HEAD" ]; then
          echo "Error: repository is in detached HEAD state; cannot sync remote branch."
          exit 1
        fi
        git config core.hooksPath /dev/null
        git fetch origin
        if [ -n "$(git status --porcelain)" ]; then
          git stash push -u -m "temp stash for releasekit"
          git rebase "origin/$CURRENT_BRANCH" || { git rebase --abort 2>/dev/null || true; echo "Warning: rebase failed; falling back to git reset --hard. Local commits ahead of origin will be discarded."; git reset --hard "origin/$CURRENT_BRANCH"; }
          git stash pop || { echo "Stash pop failed, resetting to clean working tree. Stashed changes remain available."; git reset --hard; exit 1; }
        else
          git rebase "origin/$CURRENT_BRANCH" || { git rebase --abort 2>/dev/null || true; echo "Warning: rebase failed; falling back to git reset --hard. Local commits ahead of origin will be discarded."; git reset --hard "origin/$CURRENT_BRANCH"; }
        fi
        git config --unset core.hooksPath || true
      shell: bash
      working-directory: ${{ inputs.project-dir || '.' }}

    - name: Configure git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
      shell: bash

    - name: Run ReleaseKit action
      id: run
      shell: bash
      working-directory: ${{ inputs.project-dir || '.' }}
      run: |
        echo "Current directory: $(pwd)"
        echo "Git status:"
        git status --porcelain || echo "Not a git repository"
        echo "Git config:"
        git config --list --local | head -10
        echo "Environment:"
        echo "INPUT_TARGET: $INPUT_TARGET"
        echo "INPUT_DRY_RUN: $INPUT_DRY_RUN"
        echo "INPUT_JSON: $INPUT_JSON"
        echo "Running ReleaseKit with verbose output..."
        set -x
        node ${{ github.action_path }}/scripts/run-action.mjs
        exit_code=$?
        set +x
        if [ $exit_code -ne 0 ]; then
          echo "ReleaseKit failed with exit code: $exit_code"
          echo "Checking for common issues..."
          echo "Git status after failure:"
          git status --porcelain
          echo "Recent commits:"
          git log --oneline -5 2>/dev/null || echo "Could not get git log"
          echo "Package.json exists:"
          ls -la package.json || echo "package.json not found"
          echo "Node version:"
          node --version
          echo "PNPM version:"
          pnpm --version 2>/dev/null || echo "pnpm not found"
          exit 1
        fi
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_JSON: ${{ inputs.json }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_QUIET: ${{ inputs.quiet }}
        INPUT_BUMP: ${{ inputs.bump }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_STABLE: ${{ inputs.stable }}
        INPUT_SYNC: ${{ inputs.sync }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_NPM_AUTH: ${{ inputs.npm-auth }}
        INPUT_NPM_TOKEN: ${{ inputs.npm-token }}
        INPUT_SKIP_NOTES: ${{ inputs.skip-notes }}
        INPUT_SKIP_PUBLISH: ${{ inputs.skip-publish }}
        INPUT_SKIP_GIT: ${{ inputs.skip-git }}
        INPUT_SKIP_GITHUB_RELEASE: ${{ inputs.skip-github-release }}
        INPUT_SKIP_VERIFICATION: ${{ inputs.skip-verification }}
        INPUT_PR: ${{ inputs.pr }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_PREVIEW_PRERELEASE: ${{ inputs.preview-prerelease }}
        INPUT_PREVIEW_STABLE: ${{ inputs.preview-stable }}
        INPUT_PREVIEW_DRY_RUN: ${{ inputs.preview-dry-run }}
        INPUT_PREVIEW_TARGET: ${{ inputs.preview-target }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        GITHUB_TOKEN: ${{ github.token }}
        NPM_TOKEN: ${{ inputs.npm-token }}
        VERBOSE: ${{ inputs.verbose }}
        OLLAMA_API_KEY: ${{ env.OLLAMA_API_KEY }}
