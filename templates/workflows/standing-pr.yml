# Standing Release PR — keeps a single PR open with accumulated version
# bumps and release notes. Maintainers merge to publish.
#
# Required repo setting (one-time):
#   Settings → Actions → General → Workflow permissions →
#     enable "Allow GitHub Actions to create and approve pull requests"
#
# Without it, the first `standing-pr update` run will fail with HTTP 403.
# See packages/release/docs/ci-setup.md → Standing Release PR for the full guide.
#
# Tip: exempt this PR's branch (release/*) from your build/test CI, or every update
# re-runs your whole matrix. See ci-setup.md → "Keeping CI off the standing PR".

name: Standing Release PR

on:
  push:
    branches: [main]  # Should match git.branch in releasekit.config.json
  pull_request:
    # closed: publish / immediate-release on merge. labeled/unlabeled: apply
    # bump/scope/channel override labels to the OPEN standing PR immediately.
    # edited: a maintainer ticked/unticked packages in the PR's selection region —
    # re-run so the held-back set is applied (the bot's own body edits are filtered
    # out by the sender guard below to avoid a loop).
    # (The merge-gated jobs below add `action == 'closed'` so they ignore these.)
    types: [closed, labeled, unlabeled, edited]
    branches: [main]
  schedule:
    - cron: '0 * * * *'  # Hourly — re-evaluates minAge status check as time passes

concurrency:
  # Rapid checkbox toggles each fire a separate `edited` event — route a maintainer's edits to a
  # per-PR group that cancels in-progress runs, so a flurry of ticks collapses to one rebuild of the
  # latest selection. Everything else — push / schedule / merge, AND the bot's own body edits (the
  # processing banner + the rebuilt body, which are `edited` from a Bot sender) — stays on the stable
  # shared group with cancelling OFF, so a bot edit never cancels the run doing the work and a queued
  # publish dispatch is never dropped. The `sender.type != 'Bot'` guard is what keeps the two apart.
  group: ${{ (github.event_name == 'pull_request' && github.event.action == 'edited' && github.event.sender.type != 'Bot') && format('standing-release-pr-edit-{0}', github.event.pull_request.number) || 'standing-release-pr' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'edited' && github.event.sender.type != 'Bot' }}

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  update-release-pr:
    name: Update Release PR
    # push/schedule rebuild the PR; a label change or selection-region edit on the OPEN standing PR
    # re-runs the update so bump/scope/channel overrides and held-back packages apply within seconds.
    # `state == 'open'` keeps this off the merged-PR label events that drive the jobs below. The
    # `sender.type != 'Bot'` guard is load-bearing for `edited`: the update itself rewrites the PR
    # body (an `edited` event), so without it the bot would re-trigger forever. Match on type, not a
    # hardcoded `github-actions[bot]` login, so a custom GitHub App token (its own `*[bot]` login) is
    # filtered too. `release/` prefix hardcoded (workflow `if` can't read config) — in-step config is authoritative.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'pull_request' &&
        (
          github.event.action == 'labeled' ||
          github.event.action == 'unlabeled' ||
          github.event.action == 'edited'
        ) &&
        github.event.pull_request.state == 'open' &&
        startsWith(github.event.pull_request.head.ref, 'release/') &&
        github.event.sender.type != 'Bot'
      )
    runs-on: ubuntu-latest
    steps:
      # Post an instant "updating…" banner so a maintainer who just ticked a checkbox (or changed a
      # label) knows the change was received while the slower rebuild runs — the Dependabot pattern.
      # Reactive events only (push/schedule aren't interactive). Runs BEFORE checkout so it lands within
      # seconds of the runner starting (~10-15s spin-up is the floor). The `standing-pr update` below
      # regenerates the PR body from scratch, so the banner self-clears on success; the failure step at
      # the end strips it if the run dies first. Idempotent — skips if a banner is already present.
      - name: Acknowledge the update in progress
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BODY=$(gh api "repos/$REPO/pulls/$PR" --jq '.body // ""')
          case "$BODY" in
            *'<!-- releasekit-processing -->'*) echo "Banner already present — skipping"; exit 0 ;;
          esac
          BANNER=$'<!-- releasekit-processing -->\n> 🔄 **Updating the release PR** to reflect your change… ([run details]('"$RUN_URL"$'))\n<!-- releasekit-processing-end -->'
          NEWBODY=$(printf '%s\n\n%s' "$BANNER" "$BODY")
          gh api --method PATCH "repos/$REPO/pulls/$PR" -f body="$NEWBODY" >/dev/null

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      # Using npm? Replace the line above with: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update standing release PR
        run: pnpm exec releasekit standing-pr update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Uncomment the env var matching your notes.releaseNotes.llm.provider.
          # Without it, LLM enhancement falls back to ungrouped output.
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      # On success the regenerated body already omits the banner; only a run that ended before the
      # rebuild leaves it behind. Strip the marker region so it doesn't linger as a false "in progress".
      # `cancelled()` too — a manual cancel (or a superseded reactive run) also skips the rebuild; the
      # next update self-heals it anyway, but clearing here is immediate.
      - name: Clear the in-progress banner if the update didn't finish
        if: (failure() || cancelled()) && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          BODY=$(gh api "repos/$REPO/pulls/$PR" --jq '.body // ""')
          CLEANED=$(printf '%s' "$BODY" | sed '/<!-- releasekit-processing -->/,/<!-- releasekit-processing-end -->/d')
          gh api --method PATCH "repos/$REPO/pulls/$PR" -f body="$CLEANED" >/dev/null

  immediate-release:
    # Bypass the standing PR queue and release directly. Triggered when a feeder PR
    # carrying `release:immediate` (configurable via `ci.labels.immediate`) merges to main.
    # Honours companion bump:* / scope:* / channel:* labels normally.
    # The final reconcile step keeps the standing PR fresh — released packages drop out
    # of the queue with no staleness window.
    name: Immediate Release (bypass standing PR)
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:immediate')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      # Using npm? Replace the line above with: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Direct release (bypassing standing PR)
        run: pnpm exec releasekit release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # NODE_AUTH_TOKEN unnecessary with OIDC trusted publishing. With token-based
          # npm auth, uncomment the next line:
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provider key for LLM-enhanced release notes (uncomment your provider):
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Reconcile standing PR
        # The release above tagged new versions. Use refresh-after-release, not `standing-pr update`:
        # HEAD is now a `chore: release …` commit, which the skip-pattern guard matches, so a plain
        # update no-ops. refresh-after-release forces the reconcile bypass so the queued release
        # actually reflects the post-immediate state (released packages drop out, anything still
        # queued stays) and refreshes stale feeder-PR previews. Zero-staleness reconciliation.
        run: pnpm exec releasekit refresh-after-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  publish-release:
    name: Publish Release
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      # Using npm? Replace the line above with: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish from release PR
        run: pnpm exec releasekit standing-pr publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # With OIDC trusted publishing (recommended) NODE_AUTH_TOKEN is
          # unnecessary — releasekit detects OIDC automatically. With
          # token-based npm auth, uncomment the next line:
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
