name: Bug report
description: Report a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please check existing issues first to avoid duplicates.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@releasekit/release"
        - "@releasekit/version"
        - "@releasekit/notes"
        - "@releasekit/publish"
        - "@releasekit/config"
        - "@releasekit/core"
        - "CI / workflows"
        - "Documentation"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Which version are you using?
      placeholder: "e.g., 0.1.0"

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g., 20.11.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `releasekit-version ...`
        2. Observe error...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs (use `--verbose` for more detail)
      render: shell

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct
          required: true
