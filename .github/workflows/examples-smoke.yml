# GENERATED FILE — do not edit by hand.
#
# Execution smoke-test for the runnable CI examples (issue #276). Where
# examples-validate.yml lints the examples statically, this workflow RUNS each
# example's real setup steps on a hosted runner and then a releasekit --dry-run,
# catching the missing-runtime-tool class (pnpm/cargo: command not found) that a
# static linter cannot see.
#
# The per-scenario setup steps are EXTRACTED from the shipped example workflows,
# never hand-copied, so they cannot drift. Regenerate after changing an example:
#   pnpm examples:smoke:generate
# CI verifies there is no drift via:
#   pnpm examples:smoke:check
#
# Source: scripts/examples-smoke/{scenarios.ts,generate-smoke-workflow.ts}.
name: Examples Smoke
on:
  push:
    branches:
      - main
    paths:
      - examples/**
      - scripts/examples-smoke/**
      - .github/workflows/examples-smoke.yml
  pull_request:
    branches:
      - main
    paths:
      - examples/**
      - scripts/examples-smoke/**
      - .github/workflows/examples-smoke.yml
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  prepare:
    name: Prepare fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace
      - name: Build releasekit
        run: pnpm build
      - name: Pack releasekit tarballs
        run: |-
          mkdir -p .smoke-tarballs
          for pkg in core config version notes publish release; do
            ( cd "packages/$pkg" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/.smoke-tarballs" )
          done
      - name: Build fixtures + bundle git history
        run: |-
          mkdir -p .smoke-bundles
          for s in minimal label-driven oidc monorepo-rust prerelease standing-pr; do
            out=".smoke-fixtures/$s"
            pnpm tsx scripts/examples-smoke/build-fixture.ts \
              --scenario "$s" --out "$out" --tarball-dir .smoke-tarballs --seed-lockfile
            # Ship the whole fixture (files + committed tarballs + lockfile) as a
            # single bundle so the smoke job restores it with `git clone`.
            git -C "$out" bundle create "$GITHUB_WORKSPACE/.smoke-bundles/$s.bundle" --all
          done
      - name: Upload fixture bundle (minimal)
        uses: actions/upload-artifact@v4
        with:
          name: smoke-fixture-minimal
          path: .smoke-bundles/minimal.bundle
          if-no-files-found: error
      - name: Upload fixture bundle (label-driven)
        uses: actions/upload-artifact@v4
        with:
          name: smoke-fixture-label-driven
          path: .smoke-bundles/label-driven.bundle
          if-no-files-found: error
      - name: Upload fixture bundle (oidc)
        uses: actions/upload-artifact@v4
        with:
          name: smoke-fixture-oidc
          path: .smoke-bundles/oidc.bundle
          if-no-files-found: error
      - name: Upload fixture bundle (monorepo-rust)
        uses: actions/upload-artifact@v4
        with:
          name: smoke-fixture-monorepo-rust
          path: .smoke-bundles/monorepo-rust.bundle
          if-no-files-found: error
      - name: Upload fixture bundle (prerelease)
        uses: actions/upload-artifact@v4
        with:
          name: smoke-fixture-prerelease
          path: .smoke-bundles/prerelease.bundle
          if-no-files-found: error
      - name: Upload fixture bundle (standing-pr)
        uses: actions/upload-artifact@v4
        with:
          name: smoke-fixture-standing-pr
          path: .smoke-bundles/standing-pr.bundle
          if-no-files-found: error
  smoke-minimal:
    name: smoke (minimal)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download fixture bundle
        uses: actions/download-artifact@v8
        with:
          name: smoke-fixture-minimal
          path: ${{ runner.temp }}/fixture
      - name: Restore fixture into workspace
        run: git clone --quiet "$RUNNER_TEMP/fixture/minimal.bundle" .
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Remove token-based .npmrc so OIDC can take over
        run: rm -f .npmrc
      - name: Dry-run release (pnpm + Node setup resolve; direct dry-run release reaches publish.)
        run: pnpm exec releasekit release --dry-run
  smoke-label-driven:
    name: smoke (label-driven)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download fixture bundle
        uses: actions/download-artifact@v8
        with:
          name: smoke-fixture-label-driven
          path: ${{ runner.temp }}/fixture
      - name: Restore fixture into workspace
        run: git clone --quiet "$RUNNER_TEMP/fixture/label-driven.bundle" .
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Remove token-based .npmrc so OIDC can take over
        run: rm -f .npmrc
      - name: Dry-run release (label-driven setup matches minimal; the label gate is an event guard (out of scope).)
        run: pnpm exec releasekit release --dry-run
  smoke-oidc:
    name: smoke (oidc)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download fixture bundle
        uses: actions/download-artifact@v8
        with:
          name: smoke-fixture-oidc
          path: ${{ runner.temp }}/fixture
      - name: Restore fixture into workspace
        run: git clone --quiet "$RUNNER_TEMP/fixture/oidc.bundle" .
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Remove token-based .npmrc so OIDC can take over
        run: rm -f .npmrc
      - name: Dry-run release (OIDC setup (incl. .npmrc removal) resolves; the OIDC exchange itself is dry-run only.)
        run: pnpm exec releasekit release --dry-run
  smoke-monorepo-rust:
    name: smoke (monorepo-rust)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download fixture bundle
        uses: actions/download-artifact@v8
        with:
          name: smoke-fixture-monorepo-rust
          path: ${{ runner.temp }}/fixture
      - name: Restore fixture into workspace
        run: git clone --quiet "$RUNNER_TEMP/fixture/monorepo-rust.bundle" .
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: Remove token-based .npmrc so npm OIDC can take over
        run: rm -f .npmrc
      - name: "Probe: cargo is on PATH (config enables cargo)"
        run: cargo --version
      - name: "Dry-run release (rust-toolchain provides cargo (the cargo: command not found class); npm + cargo dry-run.)"
        run: pnpm exec releasekit release --dry-run
  smoke-prerelease:
    name: smoke (prerelease)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download fixture bundle
        uses: actions/download-artifact@v8
        with:
          name: smoke-fixture-prerelease
          path: ${{ runner.temp }}/fixture
      - name: Restore fixture into workspace
        run: git clone --quiet "$RUNNER_TEMP/fixture/prerelease.bundle" .
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Remove token-based .npmrc so OIDC can take over
        run: rm -f .npmrc
      - name: Dry-run release (manual prerelease setup resolves; dry-run produces a -beta.N version.)
        run: pnpm exec releasekit release --prerelease beta --dry-run
  smoke-standing-pr:
    name: smoke (standing-pr)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download fixture bundle
        uses: actions/download-artifact@v8
        with:
          name: smoke-fixture-standing-pr
          path: ${{ runner.temp }}/fixture
      - name: Restore fixture into workspace
        run: git clone --quiet "$RUNNER_TEMP/fixture/standing-pr.bundle" .
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Dry-run release (standing-pr update setup resolves; the PR-mutating API path stays out of scope.)
        run: pnpm exec releasekit release --dry-run
