name: Release Publish

on:
  workflow_call:
    inputs:
      dry_run:
        required: true
        type: boolean
      version_output:
        required: true
        type: string
      tags:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Version, Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply version bumps
        run: |
          # Build bump flags from the version output
          BUMP_FLAGS=""
          PRERELEASE_FLAGS=""
          TARGET_FLAGS=""

          # Re-parse the version output to get the right flags
          UPDATES='${{ inputs.version_output }}'
          TAGS="${{ inputs.tags }}"

          # Run releasekit-version for real (not dry-run) to apply changes
          node packages/version/dist/index.js \
            --json \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Build packages
        run: pnpm build

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          # Stage all changed files
          git add -A

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Create the version bump commit
          # The commit message is generated by releasekit-version
          COMMIT_MSG=$(echo '${{ inputs.version_output }}' | jq -r '.commitMessage // "chore: release [skip ci]"')
          git commit -m "${COMMIT_MSG}"

          # Create tags
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [ -n "$tag" ]; then
              echo "Creating tag: ${tag}"
              git tag -a "${tag}" -m "Release ${tag}"
            fi
          done

          # Push commit and tags
          git push origin HEAD
          git push origin --tags

      - name: Publish @releasekit/version
        if: ${{ !inputs.dry_run }}
        run: |
          UPDATES='${{ inputs.version_output }}'
          HAS_VERSION=$(echo "$UPDATES" | jq -r '.updates[] | select(.packageName == "@releasekit/version") | .packageName')

          if [ -n "$HAS_VERSION" ]; then
            echo "Publishing @releasekit/version..."

            # Determine NPM tag
            IS_PRERELEASE=$(echo "$UPDATES" | jq -r '.updates[] | select(.packageName == "@releasekit/version") | .newVersion | test("-")')
            NPM_TAG="latest"
            if [ "$IS_PRERELEASE" = "true" ]; then
              NPM_TAG="next"
            fi

            pnpm --filter @releasekit/version publish --tag "${NPM_TAG}" --no-git-checks
          else
            echo "No version update for @releasekit/version, skipping publish"
          fi

      - name: Publish @releasekit/notes
        if: ${{ !inputs.dry_run }}
        run: |
          UPDATES='${{ inputs.version_output }}'
          HAS_NOTES=$(echo "$UPDATES" | jq -r '.updates[] | select(.packageName == "@releasekit/notes") | .packageName')

          if [ -n "$HAS_NOTES" ]; then
            echo "Publishing @releasekit/notes..."

            IS_PRERELEASE=$(echo "$UPDATES" | jq -r '.updates[] | select(.packageName == "@releasekit/notes") | .newVersion | test("-")')
            NPM_TAG="latest"
            if [ "$IS_PRERELEASE" = "true" ]; then
              NPM_TAG="next"
            fi

            pnpm --filter @releasekit/notes publish --tag "${NPM_TAG}" --no-git-checks
          else
            echo "No version update for @releasekit/notes, skipping publish"
          fi

      - name: Summary
        run: |
          echo "## Publish Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "> **Dry run** — no packages were published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Tags pushed: ${{ inputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          fi
