name: Release Publish

on:
  workflow_call:
    inputs:
      dry_run:
        required: true
        type: boolean
      version_output:
        required: true
        type: string
      tags:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true

permissions:
  id-token: write
  contents: write

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  publish:
    name: Version, Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply version bumps
        run: pnpm exec tsx packages/version/src/cli.ts --json ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Build packages
        run: pnpm build

      - name: Save version output
        env:
          VERSION_OUTPUT: ${{ inputs.version_output }}
        run: echo "$VERSION_OUTPUT" > version-output.json

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          COMMIT_MSG=$(jq -r '.commitMessage // "chore: release [skip ci]"' version-output.json)
          git commit -m "${COMMIT_MSG}"

          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [ -n "$tag" ]; then
              echo "Creating tag: ${tag}"
              git tag -a "${tag}" -m "Release ${tag}"
            fi
          done

          git push origin HEAD
          git push origin --tags

      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        run: pnpm exec tsx .github/workflows/scripts/publish-packages.ts version-output.json false

      - name: Summary
        run: |
          echo "## Publish Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "> **Dry run** — no packages were published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Tags pushed: ${{ inputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Published packages" >> "$GITHUB_STEP_SUMMARY"
            cat version-output.json | jq -r '.updates[] | "- \(.packageName)@\(.newVersion)"' >> "$GITHUB_STEP_SUMMARY"
          fi
