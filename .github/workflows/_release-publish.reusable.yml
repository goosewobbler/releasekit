name: Release Publish

on:
  workflow_call:
    inputs:
      packages:
        required: true
        type: string
      bump:
        required: true
        type: string
      dry_run:
        required: true
        type: boolean
    secrets:
      DEPLOY_KEY:
        required: false

permissions:
  id-token: write
  contents: write

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  publish:
    name: Release (dogfood releasekit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (SSH)
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Checkout (read-only)
        if: ${{ inputs.dry_run }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build packages
        run: pnpm build

      - name: Run releasekit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Build target flags
          TARGET_FLAGS=""
          if [ "${{ inputs.packages }}" = "version" ]; then
            TARGET_FLAGS="--target @releasekit/version"
          elif [ "${{ inputs.packages }}" = "notes" ]; then
            TARGET_FLAGS="--target @releasekit/notes"
          elif [ "${{ inputs.packages }}" = "publish" ]; then
            TARGET_FLAGS="--target @releasekit/publish"
          elif [ "${{ inputs.packages }}" = "release" ]; then
            TARGET_FLAGS="--target @releasekit/release"
          fi

          # Build bump flags
          BUMP_FLAGS="--bump ${{ inputs.bump }}"

          # Check if prerelease
          PRERELEASE_FLAGS=""
          if [ "${{ inputs.bump }}" = "prerelease" ]; then
            BUMP_FLAGS="--bump prerelease"
            PRERELEASE_FLAGS="--prerelease next"
          elif [[ "${{ inputs.bump }}" == pre* ]]; then
            BASE_BUMP="${{ inputs.bump }}"
            BASE_BUMP="${BASE_BUMP#pre}"
            BUMP_FLAGS="--bump ${BASE_BUMP}"
            PRERELEASE_FLAGS="--prerelease next"
          fi

          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          node packages/release/dist/cli.js release \
            ${BUMP_FLAGS} \
            ${PRERELEASE_FLAGS} \
            ${TARGET_FLAGS} \
            ${DRY_RUN_FLAG}

      - name: Summary
        run: |
          echo "## Release Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "> **Dry run** — no packages were published or pushed" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
