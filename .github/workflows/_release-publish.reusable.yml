name: Release Publish

on:
  workflow_call:
    inputs:
      packages:
        required: true
        type: string
      bump:
        required: true
        type: string
      dry_run:
        required: true
        type: boolean
      version_output:
        required: true
        type: string
      tags:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true

permissions:
  id-token: write
  contents: write

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  publish:
    name: Version, Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build packages
        run: pnpm build

      - name: Apply version bumps
        run: |
          # Build target flags
          TARGET_FLAGS=""
          if [ "${{ inputs.packages }}" = "version" ]; then
            TARGET_FLAGS="--target @releasekit/version"
          elif [ "${{ inputs.packages }}" = "notes" ]; then
            TARGET_FLAGS="--target @releasekit/notes"
          elif [ "${{ inputs.packages }}" = "publish" ]; then
            TARGET_FLAGS="--target @releasekit/publish"
          elif [ "${{ inputs.packages }}" = "release" ]; then
            TARGET_FLAGS="--target @releasekit/release"
          fi

          # Build bump flags
          BUMP_FLAGS="--bump ${{ inputs.bump }}"

          # Check if prerelease
          PRERELEASE_FLAGS=""
          if [ "${{ inputs.bump }}" = "prerelease" ]; then
            BUMP_FLAGS="--bump prerelease"
            PRERELEASE_FLAGS="--prerelease next"
          elif [[ "${{ inputs.bump }}" == pre* ]]; then
            BASE_BUMP="${{ inputs.bump }}"
            BASE_BUMP="${BASE_BUMP#pre}"
            BUMP_FLAGS="--bump ${BASE_BUMP}"
            PRERELEASE_FLAGS="--prerelease next"
          fi

          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          node packages/version/dist/cli.js \
            --json \
            ${BUMP_FLAGS} \
            ${PRERELEASE_FLAGS} \
            ${TARGET_FLAGS} \
            ${DRY_RUN_FLAG}

      - name: Save version output
        env:
          VERSION_OUTPUT: ${{ inputs.version_output }}
        run: echo "$VERSION_OUTPUT" > version-output.json

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          COMMIT_MSG=$(jq -r '.commitMessage // "chore: release [skip ci]"' version-output.json)
          git commit -m "${COMMIT_MSG}"

          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [ -n "$tag" ]; then
              echo "Creating tag: ${tag}"
              git tag -a "${tag}" -m "Release ${tag}"
            fi
          done

          git push origin HEAD
          git push origin --tags

      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        run: pnpm exec tsx .github/workflows/scripts/publish-packages.ts version-output.json false

      - name: Summary
        run: |
          echo "## Publish Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "> **Dry run** — no packages were published or pushed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.updates[] | "| `\(.packageName)` | \(.newVersion) |"' version-output.json >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [ -n "$tag" ]; then
              echo "- \`${tag}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
