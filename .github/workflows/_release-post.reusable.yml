name: Release Post

on:
  workflow_call:
    inputs:
      version_output:
        required: true
        type: string
      tags:
        required: true
        type: string
      ollama_base_url:
        required: false
        type: string
        default: 'https://ollama.com/api'
      ollama_model:
        required: false
        type: string
        default: 'minimax-m2.5:cloud'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OLLAMA_API_KEY:
        required: false

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build from source
        run: pnpm build

      - name: Download version output
        uses: actions/download-artifact@v4
        with:
          name: version-output

      - name: Generate release notes and create releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_BASE_URL: ${{ inputs.ollama_base_url }}
          OLLAMA_MODEL: ${{ inputs.ollama_model }}
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.tags }}"

          # Build LLM flags based on available secrets
          # LLM tasks and categories are configured in releasekit.config.json
          LLM_FLAGS=""
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            LLM_FLAGS="--llm-provider anthropic --llm-model claude-sonnet-4-20250514 --llm-tasks enhance,categorize"
          elif [ -n "$OLLAMA_API_KEY" ]; then
            LLM_FLAGS="--llm-provider ollama --llm-model $OLLAMA_MODEL --llm-base-url $OLLAMA_BASE_URL --llm-tasks enhance,categorize"
          fi

          for tag in "${TAG_ARRAY[@]}"; do
            if [ -z "$tag" ]; then
              continue
            fi

            echo "Creating GitHub Release for ${tag}..."

            # Determine if this is a prerelease
            IS_PRERELEASE=false
            if echo "$tag" | grep -qE '\-'; then
              IS_PRERELEASE=true
            fi

            # Generate release notes using releasekit-notes from built source
            NOTES=""
            if [ -f version-output.json ]; then
              NOTES=$(node packages/notes/dist/cli.js generate \
                --input version-output.json \
                --output markdown \
                --template ./templates/release-notes/release.liquid \
                ${LLM_FLAGS:+ $LLM_FLAGS} \
                || echo "")
            fi

            # Fall back to auto-generated notes if releasekit-notes fails
            PRERELEASE_FLAG=""
            if [ "$IS_PRERELEASE" = "true" ]; then
              PRERELEASE_FLAG="--prerelease"
            fi

            if [ -n "$NOTES" ]; then
              gh release create "${tag}" \
                --title "${tag}" \
                --notes "${NOTES}" \
                --draft \
                ${PRERELEASE_FLAG}
            else
              gh release create "${tag}" \
                --title "${tag}" \
                --generate-notes \
                --draft \
                ${PRERELEASE_FLAG}
            fi

            echo "Created draft release for ${tag}"
          done

      - name: Summary
        run: |
          echo "## GitHub Releases" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Draft releases created for:" >> "$GITHUB_STEP_SUMMARY"
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [ -n "$tag" ]; then
              echo "- \`${tag}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Releases are created as **drafts**. Review and publish them manually." >> "$GITHUB_STEP_SUMMARY"
