name: Release

on:
  workflow_dispatch:
    inputs:
      packages:
        description: Packages to release
        type: choice
        options:
          - all
          - version
          - notes
          - publish
          - release
        default: all
      bump:
        description: Version bump type
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor
        default: patch
      dry_run:
        description: Dry run (no publish, no push)
        type: boolean
        default: true

jobs:
  prepare:
    name: Prepare Release
    uses: ./.github/workflows/_release-prepare.reusable.yml
    with:
      packages: ${{ inputs.packages }}
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}

  publish:
    name: Publish
    needs: prepare
    if: ${{ needs.prepare.outputs.has_changes == 'true' }}
    uses: ./.github/workflows/_release-publish.reusable.yml
    permissions:
      id-token: write
      contents: write
    with:
      packages: ${{ inputs.packages }}
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
