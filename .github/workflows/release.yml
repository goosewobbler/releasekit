name: Release

on:
  workflow_dispatch:
    inputs:
      packages:
        description: Packages to release
        type: choice
        options:
          - all
          - version
          - notes
          - publish
          - release
        default: all
      bump:
        description: Version bump type
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor
        default: auto
      npm_auth:
        description: NPM auth method
        type: choice
        options:
          - auto
          - oidc
          - token
        default: oidc
      sync:
        description: Use synchronized versioning across all packages
        type: boolean
        default: false
      dry_run:
        description: Dry run (no publish, no push)
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      id-token: write
      contents: write
    with:
      packages: ${{ inputs.packages }}
      bump: ${{ inputs.bump }}
      npm_auth: ${{ inputs.npm_auth }}
      sync: ${{ inputs.sync }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
