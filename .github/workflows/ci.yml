name: CI

on:
  push:
    branches: [main]
    tags:
      - '**@v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Run all tests (ignore change detection)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  detect-changes:
    name: Detect Changes
    uses: ./.github/workflows/_ci-detect-changes.reusable.yml
    with:
      force_all: ${{ inputs.force_all || false }}

  build:
    name: Build
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/_ci-build.reusable.yml
    with:
      os: ubuntu-latest

  lockfile-validation:
    name: Validate Lockfile
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Validate lockfile
        run: |
          doc_count=$(grep -c "^lockfileVersion" pnpm-lock.yaml || echo "0")
          if [ "$doc_count" != "1" ]; then
            echo "ERROR: Lockfile has $doc_count documents (expected 1)"
            exit 1
          fi
          echo "Lockfile validated: $doc_count document(s)"

  action-test-harness:
    name: Action Test Harness
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Development Environment
        uses: ./.github/workflows/actions/setup-workspace

      - name: Download build artifacts
        uses: ./.github/workflows/actions/download-archive
        with:
          name: releasekit-build
          cache_key: ${{ needs.build.outputs.cache_key }}

      - name: Run action test harness (preview)
        run: pnpm test:action:preview

      - name: Run action test harness (release)
        run: pnpm test:action:release

  lint:
    name: Lint
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Development Environment
        uses: ./.github/workflows/actions/setup-workspace

      - name: Download build artifacts
        uses: ./.github/workflows/actions/download-archive
        with:
          name: releasekit-build
          cache_key: ${{ needs.build.outputs.cache_key }}

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Development Environment
        uses: ./.github/workflows/actions/setup-workspace

      - name: Download build artifacts
        uses: ./.github/workflows/actions/download-archive
        with:
          name: releasekit-build
          cache_key: ${{ needs.build.outputs.cache_key }}

      - name: Run typecheck
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/_ci-unit.reusable.yml
    with:
      os: ubuntu-latest
      cache_key: ${{ needs.build.outputs.cache_key }}

  integration-tests:
    name: Integration Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_integration == 'true'
    uses: ./.github/workflows/_ci-integration.reusable.yml
    with:
      cache_key: ${{ needs.build.outputs.cache_key }}

  package-tests:
    name: Package Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: ./.github/workflows/_ci-package-tests.reusable.yml
    with:
      os: ${{ matrix.os }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  e2e-tests:
    name: E2E Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_e2e == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: ./.github/workflows/_ci-e2e.reusable.yml
    with:
      os: ${{ matrix.os }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  ci-status:
    name: CI Status
    if: always()
    needs: [detect-changes, build, lockfile-validation, action-test-harness, lint, typecheck, unit-tests, integration-tests, package-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "CI failed: found job with result '$result'"
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped"
