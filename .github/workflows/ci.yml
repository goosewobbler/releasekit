name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Run all tests (ignore change detection)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  detect-changes:
    name: Detect Changes
    uses: ./.github/workflows/_ci-detect-changes.reusable.yml
    with:
      force_all: ${{ inputs.force_all || false }}

  build:
    name: Build
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/_ci-build.reusable.yml
    with:
      os: ubuntu-latest

  lint:
    name: Lint
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/workflows/actions/setup-workspace

      - name: Download build artifacts
        uses: ./.github/workflows/actions/download-archive
        with:
          name: releasekit-build
          cache_key: ${{ needs.build.outputs.cache_key }}

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/workflows/actions/setup-workspace

      - name: Download build artifacts
        uses: ./.github/workflows/actions/download-archive
        with:
          name: releasekit-build
          cache_key: ${{ needs.build.outputs.cache_key }}

      - name: Run typecheck
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/_ci-unit.reusable.yml
    with:
      os: ubuntu-latest
      cache_key: ${{ needs.build.outputs.cache_key }}

  integration-tests:
    name: Integration Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_integration == 'true'
    uses: ./.github/workflows/_ci-integration.reusable.yml
    with:
      cache_key: ${{ needs.build.outputs.cache_key }}

  e2e-tests:
    name: E2E Tests
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_e2e == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            module-type: esm
          - os: ubuntu-latest
            module-type: cjs
          - os: macos-latest
            module-type: esm
          - os: macos-latest
            module-type: cjs
          - os: windows-latest
            module-type: esm
          - os: windows-latest
            module-type: cjs
    uses: ./.github/workflows/_ci-e2e.reusable.yml
    with:
      os: ${{ matrix.os }}
      module-type: ${{ matrix.module-type }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  ci-status:
    name: CI Status
    if: always()
    needs: [detect-changes, lint, typecheck, unit-tests, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "CI failed: found job with result '$result'"
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped"
