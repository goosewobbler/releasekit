name: Setup Workspace
description: Setup Node.js, pnpm, and install dependencies

inputs:
  node-version:
    description: Node.js version
    default: '24'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: https://registry.npmjs.org

    - name: Create bin stubs
      shell: bash
      run: |
        # Create placeholder dist/cli.js files so pnpm install can create bin symlinks.
        # These get overwritten by the real build step that follows.
        for pkg in packages/version packages/notes packages/publish packages/release; do
          mkdir -p "$pkg/dist"
          [ -f "$pkg/dist/cli.js" ] || echo '#!/usr/bin/env node' > "$pkg/dist/cli.js"
        done

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
