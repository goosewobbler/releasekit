name: Release on Push

# Triggers after CI completes on main. Release commits contain [skip ci] which
# causes GitHub to skip CI entirely — so this workflow never fires for them,
# breaking the release loop without any extra condition needed.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-labels:
    name: Check Release Labels
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check for release labels
        id: check
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get PRs that were merged with this commit
          PRS=$(gh api repos/$REPO/commits/$COMMIT_SHA/pulls --jq '.[].number' 2>/dev/null || echo "")
          
          if [ -z "$PRS" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No PRs found for commit, skipping release"
            exit 0
          fi
          
          # Check labels on the merged PRs
          LABELS=""
          for pr in $PRS; do
            LABELS=$(gh api repos/$REPO/pulls/$pr --jq '.labels[].name' 2>/dev/null)
            # Check for any release label
            if echo "$LABELS" | grep -qE "release:(patch|minor|major|prerelease|stable)"; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Release label found on PR #$pr"
              exit 0
            fi
          done
          
          echo "should_release=false" >> $GITHUB_OUTPUT
          echo "No release label found on merged PRs, skipping release"

  release:
    name: Auto Release
    needs: check-labels
    if: |
      needs.check-labels.outputs.should_release == 'true' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      id-token: write
      contents: write
    with:
      packages: all
      bump: auto
      sync: true
      dry_run: false
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
