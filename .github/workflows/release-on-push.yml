name: Release on Push

# Triggers after CI completes on main. Release commits contain [skip ci] which
# causes GitHub to skip CI entirely — so this workflow never fires for them,
# breaking the release loop without any extra condition needed.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-labels:
    name: Check Release Labels
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check for release labels
        id: check
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Helper function to safely call gh API and capture output
          gh_api() {
            local result
            result=$(gh api "$1" 2>&1) || true
            echo "$result"
          }
          
          # Get PRs that were merged with this commit (includes labels)
          PRS_OUTPUT=$(gh_api "repos/$REPO/commits/$COMMIT_SHA/pulls")
          PRS=$(echo "$PRS_OUTPUT" | jq -r '.[].number' 2>/dev/null | tr '\n' ' ') || PRS=""
          
          if [ -z "$PRS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No PRs found for commit, skipping release"
            [ -n "$PRS_OUTPUT" ] && echo "Debug: $PRS_OUTPUT"
            exit 0
          fi
          
          # Check labels directly from the PR data (already fetched above)
          LABELS=$(echo "$PRS_OUTPUT" | jq -r '.[].labels[].name' 2>/dev/null | tr '\n' ' ')
          if echo "$LABELS" | grep -qE "^release:(patch|minor|major|prerelease|stable)$"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release label found on merged PRs"
            exit 0
          fi
          
          echo "should_release=false" >> "$GITHUB_OUTPUT"
          echo "No release label found on merged PRs, skipping release"

  release:
    name: Auto Release
    needs: check-labels
    if: needs.check-labels.outputs.should_release == 'true'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      id-token: write
      contents: write
    with:
      packages: all
      bump: auto
      sync: true
      dry_run: false
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
