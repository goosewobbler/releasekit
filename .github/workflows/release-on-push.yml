name: Release on Push

# Triggers after CI completes on main. Release commits contain [skip ci] which
# causes GitHub to skip CI entirely — so this workflow never fires for them,
# breaking the release loop without any extra condition needed.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Auto Release
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      id-token: write
      contents: write
    with:
      packages: all
      bump: auto
      sync: true
      dry_run: false
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
