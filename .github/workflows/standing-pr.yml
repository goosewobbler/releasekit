name: Standing Release PR

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: standing-release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  update-release-pr:
    name: Update Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update standing release PR
        run: node packages/release/dist/cli.js standing-pr update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  publish-release:
    name: Publish Release
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish from release PR
        run: node packages/release/dist/cli.js standing-pr publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
