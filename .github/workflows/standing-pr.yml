name: Standing Release PR

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: standing-release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  update-release-pr:
    name: Update Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update standing release PR
        run: node packages/release/dist/cli.js standing-pr update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Uncomment the env var matching your notes.releaseNotes.llm.provider.
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  immediate-release:
    name: Immediate Release (bypass standing PR)
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:immediate')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Direct release (bypassing standing PR)
        run: node packages/release/dist/cli.js release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Reconcile standing PR
        run: node packages/release/dist/cli.js standing-pr update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  # The pull_request: closed event does not fire when the PR's branch was created by GITHUB_TOKEN
  # (GitHub suppresses downstream workflow runs to prevent recursion). Detect the standing-PR
  # merge from the push event instead by looking up the merge commit's PR.
  detect-release-merge:
    name: Detect release merge
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.detect.outputs.pr_number }}
    steps:
      - name: Find PR for merge commit
        id: detect
        env:
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PRS=$(gh api "repos/$REPO/commits/$COMMIT_SHA/pulls" 2>/dev/null || echo '[]')
          PR_NUM=$(echo "$PRS" | jq -r '[.[] | select(.head.ref | startswith("release/"))][0].number // empty')
          if [ -n "$PR_NUM" ]; then
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "Detected standing PR merge: PR #$PR_NUM"
          else
            echo "No standing PR merge detected for this push"
          fi

  publish-release:
    name: Publish Release
    needs: detect-release-merge
    if: needs.detect-release-merge.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish from release PR
        run: node packages/release/dist/cli.js standing-pr publish --pr ${{ needs.detect-release-merge.outputs.pr_number }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
