name: Standing Release PR

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: standing-release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # Runs first on every push to main so the downstream jobs can serialize on its output:
  # if the push is the merge of a release/* PR, only `publish-release` runs;
  # otherwise only `update-release-pr` runs. Without this gate, both would run in parallel
  # and `update-release-pr` could collect the just-released commits as "unreleased" before
  # `publish-release` finishes tagging.
  detect-release-merge:
    name: Detect release merge
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.detect.outputs.pr_number }}
    steps:
      # Sparse checkout of just the config file — avoids cloning the whole repo while letting
      # the branch name come from a single source of truth (ci.standingPr.branch).
      - name: Checkout config
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: releasekit.config.json
          sparse-checkout-cone-mode: false

      - name: Find PR for merge commit
        id: detect
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          STANDING_PR_BRANCH=$(jq -r '.ci.standingPr.branch // "release/next"' releasekit.config.json)

          # Primary path: parse the PR number from the squash-merge subject `(#N)` suffix.
          # GitHub's commits→PRs cross-reference index is eventually consistent and can return
          # an empty list for ~30s after a merge. Looking up the PR object by number is
          # immediately stable, so when we know the number from the subject we skip the racy
          # endpoint entirely. Falls back to the API approach if the subject doesn't match
          # (merge commit, rebase merge, direct push).
          PR_NUM=""
          SUBJECT=$(printf '%s\n' "$COMMIT_MSG" | head -1)
          if [[ "$SUBJECT" =~ \(#([0-9]+)\)[[:space:]]*$ ]]; then
            CANDIDATE="${BASH_REMATCH[1]}"
            HEAD_REF=$(gh pr view "$CANDIDATE" --repo "$REPO" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
            if [ "$HEAD_REF" = "$STANDING_PR_BRANCH" ]; then
              PR_NUM="$CANDIDATE"
            else
              echo "Subject references PR #$CANDIDATE but its head ref ('$HEAD_REF') is not '$STANDING_PR_BRANCH' — not a standing-PR merge"
            fi
          fi

          # Fallback path: ask the API for PRs cross-referencing this commit. Used when the
          # subject doesn't carry a PR number (non-squash merges) or when the candidate's head
          # ref didn't match. Retry on API errors (rate limits, 5xx, network blips); a
          # successful empty result means there's no PR for this commit.
          if [ -z "$PR_NUM" ]; then
            PRS=""
            for attempt in 1 2 3; do
              if PRS=$(gh api "repos/$REPO/commits/$COMMIT_SHA/pulls" 2>&1); then
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "::warning::gh api failed (attempt $attempt/3): $PRS — retrying after ${attempt}s"
                sleep "$attempt"
                PRS=""
              else
                echo "::error::gh api failed after 3 attempts: $PRS"
                exit 1
              fi
            done

            PR_NUM=$(echo "$PRS" | jq --arg branch "$STANDING_PR_BRANCH" -r \
              '[.[] | select(.head.ref == $branch)][0].number // empty')
          fi

          if [ -n "$PR_NUM" ]; then
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "Detected standing PR merge: PR #$PR_NUM (head: $STANDING_PR_BRANCH)"
          else
            echo "No standing PR merge detected for this push (looking for head: $STANDING_PR_BRANCH)"
          fi

  update-release-pr:
    name: Update Release PR
    needs: detect-release-merge
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect-release-merge.outputs.pr_number == ''
    uses: ./.github/workflows/_standing-pr-update.reusable.yml
    permissions:
      contents: write
      pull-requests: write
    secrets:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  # Same architectural constraint as `trigger-publish` below: any OIDC publish triggered from
  # `standing-pr.yml` would have `workflow_ref = standing-pr.yml`, which doesn't match the
  # `release.yml` trusted-publisher entry on npmjs.com (only one is allowed per package). So
  # immediate releases are dispatched to `release.yml workflow_dispatch` too. The
  # `reconcile_after=true` flag tells release.yml to rebuild the standing PR after the publish
  # succeeds, replacing what used to be the `reconcile-standing-pr` job here.
  trigger-immediate:
    name: Trigger immediate release via release.yml
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:immediate')
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch release.yml
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh workflow run release.yml \
            --repo "$REPO" \
            --ref main \
            --field packages=all \
            --field bump=auto \
            --field npm_auth=oidc \
            --field sync=true \
            --field dry_run=false \
            --field reconcile_after=true
          echo "Dispatched release.yml for immediate release of PR #$PR_NUMBER"
          echo "Watch publish progress: https://github.com/$REPO/actions/workflows/release.yml"

  # Trigger release.yml via workflow_dispatch instead of running the publish here directly.
  # npm trusted publishing matches the OIDC token's top-level `workflow_ref` claim (only one
  # trusted-publisher entry per package, currently `release.yml`), so any publish triggered from
  # `standing-pr.yml` would be rejected with ENEEDAUTH. Routing through `gh workflow run
  # release.yml` makes the dispatched run's `workflow_ref` resolve to `release.yml`, which
  # matches the trusted-publisher config and lets OIDC trusted publishing succeed.
  trigger-publish:
    name: Trigger publish via release.yml
    needs: detect-release-merge
    if: needs.detect-release-merge.outputs.pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch release.yml
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.detect-release-merge.outputs.pr_number }}
        run: |
          set -euo pipefail
          gh workflow run release.yml \
            --repo "$REPO" \
            --ref main \
            --field "standing_pr_number=$PR_NUMBER"
          echo "Dispatched release.yml with standing_pr_number=$PR_NUMBER"
          echo "Watch publish progress: https://github.com/$REPO/actions/workflows/release.yml"
