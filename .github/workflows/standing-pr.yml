name: Standing Release PR

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: standing-release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # Runs first on every push to main so the downstream jobs can serialize on its output:
  # if the push is the merge of a release/* PR, only `publish-release` runs;
  # otherwise only `update-release-pr` runs. Without this gate, both would run in parallel
  # and `update-release-pr` could collect the just-released commits as "unreleased" before
  # `publish-release` finishes tagging.
  detect-release-merge:
    name: Detect release merge
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.detect.outputs.pr_number }}
    steps:
      # Sparse checkout of just the config file — avoids cloning the whole repo while letting
      # the branch name come from a single source of truth (ci.standingPr.branch).
      - name: Checkout config
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: releasekit.config.json
          sparse-checkout-cone-mode: false

      - name: Find PR for merge commit
        id: detect
        env:
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          STANDING_PR_BRANCH=$(jq -r '.ci.standingPr.branch // "release/next"' releasekit.config.json)

          # Retry transient API errors (rate limits, 5xx, network blips) before giving up. The
          # API call distinguishes "no PR for this commit" (returns []) from real failures, so
          # silent fall-through to update-release-pr is only safe when we got a successful
          # response. On persistent failure we fail the job loudly — both downstream jobs will
          # be skipped, but the next push retries the workflow.
          PRS=""
          for attempt in 1 2 3; do
            if PRS=$(gh api "repos/$REPO/commits/$COMMIT_SHA/pulls" 2>&1); then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::gh api failed (attempt $attempt/3): $PRS — retrying after ${attempt}s"
              sleep "$attempt"
              PRS=""
            else
              echo "::error::gh api failed after 3 attempts: $PRS"
              exit 1
            fi
          done

          PR_NUM=$(echo "$PRS" | jq --arg branch "$STANDING_PR_BRANCH" -r \
            '[.[] | select(.head.ref == $branch)][0].number // empty')
          if [ -n "$PR_NUM" ]; then
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "Detected standing PR merge: PR #$PR_NUM (head: $STANDING_PR_BRANCH)"
          else
            echo "No standing PR merge detected for this push (looking for head: $STANDING_PR_BRANCH)"
          fi

  update-release-pr:
    name: Update Release PR
    needs: detect-release-merge
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect-release-merge.outputs.pr_number == ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update standing release PR
        run: node packages/release/dist/cli.js standing-pr update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Uncomment the env var matching your notes.releaseNotes.llm.provider.
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  # Delegates to the same reusable release workflow used by `release.yml` so npm OIDC auth and
  # SSH-based git push are configured identically — running the CLI inline previously skipped
  # both, causing "ENEEDAUTH" on publish and inconsistent push behaviour.
  immediate-release:
    name: Immediate Release (bypass standing PR)
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:immediate')
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      id-token: write
      contents: write
    with:
      packages: all
      bump: auto
      sync: true
      dry_run: false
      npm_auth: oidc
    secrets:
      ssh_key: ${{ secrets.DEPLOY_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  build-action-immediate:
    name: Build and tag action dist
    needs: immediate-release
    if: needs.immediate-release.result == 'success' && needs.immediate-release.outputs.action_tag != ''
    uses: ./.github/workflows/_action-release.reusable.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.immediate-release.outputs.action_tag }}
    secrets:
      ssh_key: ${{ secrets.DEPLOY_KEY }}

  # After an immediate release, the standing PR's queued changes overlap with what was just
  # published. Re-running standing-pr update reconciles: closes the standing PR if nothing's
  # left, otherwise rewrites the release branch against the new HEAD.
  reconcile-standing-pr:
    name: Reconcile standing PR (after immediate release)
    needs: immediate-release
    # Skip when nothing actually released — under sync mode (the current config), action_tag is
    # set whenever any package releases. If you switch back to async, this gate becomes too
    # narrow (it only fires when @releasekit/release itself is bumped) and should be revisited.
    if: needs.immediate-release.result == 'success' && needs.immediate-release.outputs.action_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reconcile standing PR
        run: node packages/release/dist/cli.js standing-pr update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Uncomment the env var matching your notes.releaseNotes.llm.provider.
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

  publish-release:
    name: Publish Release
    needs: detect-release-merge
    if: needs.detect-release-merge.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish from release PR
        run: node packages/release/dist/cli.js standing-pr publish --pr "${{ needs.detect-release-merge.outputs.pr_number }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
