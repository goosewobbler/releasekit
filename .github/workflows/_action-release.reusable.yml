name: Action Release

# Runs when releasekit-release is tagged. Builds the dist, commits it, and
# creates/updates the action version tags (v1.2.3, v1) that consumers pin to.

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true

permissions:
  contents: write

jobs:
  build-action:
    name: Build and tag action dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          ref: ${{ inputs.tag }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Commit dist and tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git add -f packages/release/dist/
          git commit --no-verify -m "chore: build action dist for ${RELEASE_TAG} [skip ci]"

          # Extract semver from tag: releasekit-release-v1.2.3 -> 1.2.3
          VERSION="${RELEASE_TAG#releasekit-release-v}"
          MAJOR="${VERSION%%.*}"

          # Immutable patch tag — skip if it already exists (idempotent re-runs)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

          # Moving major alias — only update for stable releases
          if [[ "${VERSION}" != *"-"* ]]; then
            git tag -f "v${MAJOR}"
            git push origin -f "v${MAJOR}"
          else
            echo "Prerelease ${VERSION} — skipping major alias update"
          fi