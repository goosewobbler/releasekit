name: Action Release

# Runs when releasekit-release is tagged. Builds the dist, commits it, and
# creates/updates the action version tags (v1.2.3, v1) that consumers pin to.

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      ssh_key:
        required: true

permissions:
  contents: write

jobs:
  build-action:
    name: Build and tag action dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ssh_key }}
          ref: ${{ inputs.tag }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Commit dist and tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -f packages/release/dist/
          git commit --no-verify -m "chore: build action dist for ${RELEASE_TAG} [skip ci]"

          # Extract semver from the sync-mode shared tag, e.g. `v1.2.3` -> `1.2.3`.
          VERSION="${RELEASE_TAG#v}"
          MAJOR="${VERSION%%.*}"

          # The release tag itself is already `v${VERSION}` in sync mode, so the version tag
          # exists. Just ensure the GitHub Release exists (idempotent for re-runs).
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping"
          else
            if [[ "${VERSION}" != *"-"* ]]; then
              gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
            else
              gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes --prerelease
            fi
          fi

          # Moving major alias — only update for stable releases
          if [[ "${VERSION}" != *"-"* ]]; then
            git tag -f "v${MAJOR}"
            git push origin -f "v${MAJOR}"
          else
            echo "Prerelease ${VERSION} — skipping major alias update"
          fi