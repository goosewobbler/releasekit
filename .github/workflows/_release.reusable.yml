name: Release

on:
  workflow_call:
    inputs:
      packages:
        required: true
        type: string
      bump:
        required: false
        type: string
        default: auto
      dry_run:
        required: false
        type: boolean
        default: false
      npm_auth:
        required: false
        type: string
        default: oidc
      sync:
        required: false
        type: boolean
        default: false
      standing_pr_number:
        description: When set, run `standing-pr publish` against this PR number instead of the full release flow. Routes the standing-PR publish path through this trusted-publisher workflow so npm OIDC authenticates correctly.
        required: false
        type: string
        default: ''
    secrets:
      ssh_key:
        required: false
      OLLAMA_API_KEY:
        required: false
    outputs:
      action_tag:
        description: The releasekit-release tag created by this run, if any
        value: ${{ jobs.release.outputs.action_tag }}

permissions:
  id-token: write
  contents: write
  pull-requests: write # post the partial-publish failure report on the merged standing PR

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      action_tag: ${{ steps.extract-tag.outputs.action_tag }}
    steps:
      - name: Checkout (SSH)
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ssh_key }}

      - name: Checkout (read-only)
        if: ${{ inputs.dry_run }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup workspace
        uses: ./.github/workflows/actions/setup-workspace

      - name: Build packages
        run: pnpm build

      - name: Run releasekit
        id: release
        if: inputs.standing_pr_number == ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          INPUT_PACKAGES: ${{ inputs.packages }}
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_NPM_AUTH: ${{ inputs.npm_auth }}
          INPUT_SYNC: ${{ inputs.sync }}
        run: |
          # Build target flags
          TARGET_FLAGS=""
          if [ "$INPUT_PACKAGES" = "version" ]; then
            TARGET_FLAGS="--target @releasekit/version"
          elif [ "$INPUT_PACKAGES" = "notes" ]; then
            TARGET_FLAGS="--target @releasekit/notes"
          elif [ "$INPUT_PACKAGES" = "publish" ]; then
            TARGET_FLAGS="--target @releasekit/publish"
          elif [ "$INPUT_PACKAGES" = "release" ]; then
            TARGET_FLAGS="--target @releasekit/release"
          fi

          # Build bump flags (omit entirely for 'auto' — releasekit detects from commits)
          BUMP_FLAGS=""
          PRERELEASE_FLAGS=""
          if [ "$INPUT_BUMP" != "auto" ] && [ -n "$INPUT_BUMP" ]; then
            if [ "$INPUT_BUMP" = "prerelease" ]; then
              BUMP_FLAGS="--bump prerelease"
              PRERELEASE_FLAGS="--prerelease next"
            elif [[ "$INPUT_BUMP" == pre* ]]; then
              # Pass the composed pre* bump through verbatim — the engine handles premajor/
              # preminor/prepatch directly (escalating a fresh prerelease line). De-composing to
              # "--bump <magnitude> --prerelease" would increment an existing prerelease instead (#335).
              BUMP_FLAGS="--bump ${INPUT_BUMP}"
              PRERELEASE_FLAGS="--prerelease next"
            else
              BUMP_FLAGS="--bump $INPUT_BUMP"
            fi
          fi

          DRY_RUN_FLAG=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          NPM_AUTH_FLAG=""
          if [ -n "$INPUT_NPM_AUTH" ]; then
            # Validate npm_auth against allowed values to prevent argument injection
            case "$INPUT_NPM_AUTH" in
              auto|oidc|token)
                NPM_AUTH_FLAG="--npm-auth $INPUT_NPM_AUTH"
                ;;
              *)
                echo "::error::Invalid npm_auth value: '$INPUT_NPM_AUTH'. Must be one of: auto, oidc, token"
                exit 1
                ;;
            esac
          fi

          SYNC_FLAG=""
          if [ "$INPUT_SYNC" = "true" ]; then
            SYNC_FLAG="--sync"
          fi

          # Run releasekit and capture JSON output (stdout only)
          # Use local releasekit from the built packages
          set +e
          RELEASE_OUTPUT=$(node packages/release/dist/dispatcher.js release \
            --json \
            ${BUMP_FLAGS} \
            ${PRERELEASE_FLAGS} \
            ${TARGET_FLAGS} \
            ${DRY_RUN_FLAG} \
            ${NPM_AUTH_FLAG} \
            ${SYNC_FLAG} \
            2> >(tee /tmp/release_stderr >&2))
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::releasekit failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          # Check if output is valid JSON (releasekit returns null for no changes)
          if echo "$RELEASE_OUTPUT" | jq -e '.versionOutput' > /dev/null 2>&1; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_OUTPUT" > release-output.json
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # Standing-PR publish path. Routed through this reusable so the OIDC `job_workflow_ref`
      # matches the npm trusted-publisher entry — npm only allows one trusted-publisher
      # workflow path per package, and that path is this file.
      - name: Run releasekit (standing-pr publish)
        id: release-standing-pr
        if: inputs.standing_pr_number != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          STANDING_PR_NUMBER: ${{ inputs.standing_pr_number }}
          INPUT_NPM_AUTH: ${{ inputs.npm_auth }}
        run: |
          if [ "${INPUT_NPM_AUTH:-oidc}" != "oidc" ]; then
            echo "::error::standing-pr publish only supports npm_auth=oidc (got: '${INPUT_NPM_AUTH}')"
            exit 1
          fi
          set +e
          RELEASE_OUTPUT=$(node packages/release/dist/cli.js standing-pr publish \
            --pr "$STANDING_PR_NUMBER" \
            --npm-auth oidc \
            --json \
            2> >(tee /tmp/release_stderr >&2))
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::standing-pr publish failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          if echo "$RELEASE_OUTPUT" | jq -e '.versionOutput' > /dev/null 2>&1; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_OUTPUT" > release-output.json
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract action tag
        id: extract-tag
        if: ${{ !inputs.dry_run }}
        env:
          STANDING_PR: ${{ inputs.standing_pr_number }}
          HAS_CHANGES: ${{ steps.release.outputs.has_changes || steps.release-standing-pr.outputs.has_changes }}
        run: |
          # Source of truth is git, not the captured JSON. The publish creates the sync-mode release
          # tag at HEAD (createReleaseTags), so a tag on HEAD is authoritative and immune to a stdout
          # hiccup emptying release-output.json — which could otherwise leave action_tag empty and
          # silently skip the action-dist build. Consumed by _action-release (the GitHub Action build)
          # and to gate reconcile-standing-pr in standing-pr.yml.
          ACTION_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)

          # Fail loud when a publish that MUST tag produced none: a red run beats a silently broken
          # published tag. The standing-PR publish of a merged PR always releases; the normal release
          # path may legitimately find no changes (no tag expected).
          if [ -z "$ACTION_TAG" ] && { [ -n "$STANDING_PR" ] || [ "$HAS_CHANGES" = "true" ]; }; then
            echo "::error::Publish reported success but no vX.Y.Z tag is on HEAD — the action-dist build would be skipped, stranding a dist-less action tag."
            exit 1
          fi

          echo "action_tag=${ACTION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_PACKAGES: ${{ inputs.packages }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_NPM_AUTH: ${{ inputs.npm_auth }}
          INPUT_SYNC: ${{ inputs.sync }}
          HAS_CHANGES: ${{ steps.release.outputs.has_changes || steps.release-standing-pr.outputs.has_changes }}
        run: |
          echo "## Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump type | \`${INPUT_BUMP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Packages | \`${INPUT_PACKAGES}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NPM auth | \`${INPUT_NPM_AUTH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sync mode | \`${INPUT_SYNC}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | \`${INPUT_DRY_RUN}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$HAS_CHANGES" != "true" ]; then
            echo "> **No releasable changes found**" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            echo "> **Dry run** — no packages were published or pushed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "### Package Updates" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.versionOutput.updates[] | "| `\(.packageName)` | \(.newVersion) |"' release-output.json >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.versionOutput.tags[]' release-output.json | while read -r tag; do
            echo "- \`${tag}\`" >> "$GITHUB_STEP_SUMMARY"
          done

          if jq -e '.packageNotes | length > 0' release-output.json > /dev/null 2>&1; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Changelog Preview" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.packageNotes | to_entries[] | "<details>\n<summary>\(.key)</summary>\n\n\(.value)\n</details>"' release-output.json >> "$GITHUB_STEP_SUMMARY"
          fi

          if jq -e '.releaseNotes | length > 0' release-output.json > /dev/null 2>&1; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Release Notes Preview" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.releaseNotes | to_entries[] | "<details>\n<summary>\(.key)</summary>\n\n\(.value)\n</details>"' release-output.json >> "$GITHUB_STEP_SUMMARY"
          fi
